<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptPal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 360px;
      min-height: 400px;
      background: #fff;
      color: #333;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid #eee;
    }
    
    .header svg {
      color: #6366f1;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .content {
      padding: 16px;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 13px;
      font-weight: 500;
      color: #666;
      margin-bottom: 8px;
    }
    
    .selection-preview {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      max-height: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .image-preview {
      width: 100%;
      max-height: 120px;
      object-fit: contain;
      border-radius: 8px;
      background: #f5f5f5;
    }
    
    .style-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    
    .style-btn {
      padding: 8px 4px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .style-btn:hover {
      border-color: #6366f1;
      color: #6366f1;
    }
    
    .style-btn.active {
      background: #6366f1;
      color: #fff;
      border-color: #6366f1;
    }
    
    .output-type {
      display: flex;
      gap: 8px;
    }
    
    .output-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .output-btn:hover {
      border-color: #6366f1;
    }
    
    .output-btn.active {
      background: #6366f1;
      color: #fff;
      border-color: #6366f1;
    }
    
    .generate-btn {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    
    .generate-btn:hover {
      background: #4f46e5;
    }
    
    .generate-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .result {
      margin-top: 16px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .result-title {
      font-size: 13px;
      font-weight: 500;
    }
    
    .copy-btn {
      padding: 4px 8px;
      font-size: 12px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .copy-btn:hover {
      border-color: #6366f1;
      color: #6366f1;
    }
    
    .prompt-output {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
      max-height: 150px;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', monospace;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px;
      color: #666;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #ddd;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      text-align: center;
    }
    
    .open-btn {
      font-size: 13px;
      color: #6366f1;
      text-decoration: none;
    }
    
    .open-btn:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
    </svg>
    <h1>PromptPal</h1>
  </div>
  
  <div class="content">
    <div class="section">
      <div class="section-title">选择的内容</div>
      <div id="selection-preview" class="selection-preview">
        选中网页中的文本或图片...
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">输出类型</div>
      <div class="output-type">
        <button class="output-btn active" data-type="image">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          图片
        </button>
        <button class="output-btn" data-type="video">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M10 9l5 3-5 3V9z"/>
          </svg>
          视频
        </button>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">风格</div>
      <div class="style-grid">
        <button class="style-btn active" data-style="photorealistic">写实</button>
        <button class="style-btn" data-style="anime">动漫</button>
        <button class="style-btn" data-style="3d-render">3D</button>
        <button class="style-btn" data-style="portrait">人像</button>
        <button class="style-btn" data-style="cyberpunk">赛博</button>
        <button class="style-btn" data-style="illustration">插画</button>
      </div>
    </div>
    
    <button id="generate-btn" class="generate-btn">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
      </svg>
      生成提示词
    </button>
    
    <div id="result" class="result" style="display: none;">
      <div class="result-header">
        <span class="result-title">生成的提示词</span>
        <button id="copy-btn" class="copy-btn">复制</button>
      </div>
      <div id="prompt-output" class="prompt-output"></div>
      <button id="open-web-btn" class="generate-btn" style="margin-top: 12px;">
        在 Web 端打开
      </button>
    </div>
    
    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <span>生成中...</span>
    </div>
  </div>
  
  <div class="footer">
    <a href="#" id="open-web" class="open-btn">打开 PromptPal Web</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
